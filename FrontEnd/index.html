<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoU - Análise de Documentos com IA</title>
    <link rel="stylesheet" href="assets/css/style.css"> 

</head>
<body>

    <div class="container">
        <div class="header">
            <h1>AutoU</h1>
            <p>Envie documentos ou textos para análise da IA</p>
        </div>

        <form id="aiForm">
            <div class="form-group">
                <label for="fileInput">Anexar Arquivo (.txt, .pdf)</label>
                <input type="file" id="fileInput" accept=".txt, .pdf">
            </div>

            <div id="box-resultado" style="display: none; margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background-color: #f9f9f9;">
            <h3 style="margin-top: 0;">
                Categoria: <span id="badge-categoria" style="padding: 4px 8px; border-radius: 4px; font-size: 14px;"></span>
            </h3>
            <p style="margin-bottom: 5px;"><strong>Sugestão de Resposta:</strong></p>
            <textarea id="texto-resposta-ia" rows="4" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc;"></textarea>
            <button id="btn-copiar" type="button" style="margin-top: 10px; padding: 8px 16px; cursor: pointer;">
                📋 Copiar Resposta
            </button>
            </div>

            <div class="divider">OU</div>

            <div class="form-group">
                <label for="textInput">Colar Texto (ex: Corpo de Email)</label>
                <textarea id="textInput" placeholder="Cole o conteúdo do texto aqui..."></textarea>
            </div>

            <button type="submit" id="submitBtn">Enviar para IA</button>
        </form>

        <div id="statusMessage"></div>
    </div>

    <script src="assets/js/script.js"> </script>
</body>
</html>
