<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoU - Análise de Documentos com IA</title>
    <style>
        :root {
            --primary-orange: #f8991d; /* Cor baseada na logo AutoU */
            --dark-gray: #333333;
            --light-gray: #f4f4f9;
            --border-radius: 8px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-gray);
            color: var(--dark-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            color: var(--primary-orange);
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 1px;
        }

        .header p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="file"] {
            display: block;
            width: 100%;
            padding: 10px;
            border: 1px dashed #ccc;
            border-radius: var(--border-radius);
            background-color: #fafafa;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: var(--border-radius);
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }

        textarea:focus, input[type="file"]:focus {
            outline: none;
            border-color: var(--primary-orange);
        }

        .divider {
            text-align: center;
            margin: 15px 0;
            color: #999;
            font-weight: bold;
            font-size: 0.9rem;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-orange);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #e0891a;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #statusMessage {
            margin-top: 15px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .success { color: #28a745; }
        .error { color: #dc3545; }
        .loading { color: var(--primary-orange); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>AutoU</h1>
            <p>Envie documentos ou textos para análise da IA</p>
        </div>

        <form id="aiForm">
            <div class="form-group">
                <label for="fileInput">Anexar Arquivo (.txt, .pdf)</label>
                <input type="file" id="fileInput" accept=".txt, .pdf">
            </div>

            <div class="divider">OU</div>

            <div class="form-group">
                <label for="textInput">Colar Texto (ex: Corpo de Email)</label>
                <textarea id="textInput" placeholder="Cole o conteúdo do texto aqui..."></textarea>
            </div>

            <button type="submit" id="submitBtn">Enviar para IA</button>
        </form>

        <div id="statusMessage"></div>
    </div>

    <script>
        document.getElementById('aiForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fileInput = document.getElementById('fileInput');
            const textInput = document.getElementById('textInput');
            const statusMessage = document.getElementById('statusMessage');
            const submitBtn = document.getElementById('submitBtn');

            if (fileInput.files.length === 0 && textInput.value.trim() === '') {
                statusMessage.textContent = 'Por favor, anexe um arquivo ou insira um texto.';
                statusMessage.className = 'error';
                return;
            }

            const formData = new FormData();
            
            if (fileInput.files.length > 0) {
                formData.append('arquivo', fileInput.files[0]);
            }
            
            if (textInput.value.trim() !== '') {
                formData.append('corpo_email', textInput.value.trim());
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Enviando...';
            statusMessage.textContent = 'Processando com a IA...';
            statusMessage.className = 'loading';

            try {

                const response = await fetch('http://127.0.0.1:8000/categorizar', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const result = await response.json();
                    statusMessage.textContent = 'Enviado com sucesso! IA analisou os dados.';
                    statusMessage.className = 'success';
                    console.log('Resposta da IA:', result);

                } else {
                    throw new Error('Falha na resposta do servidor');
                }
            } catch (error) {
                console.error('Erro no envio:', error);
                statusMessage.textContent = 'Erro ao enviar para a IA. Verifique a conexão.';
                statusMessage.className = 'error';
            } finally {
                // Restaura o botão
                submitBtn.disabled = false;
                submitBtn.textContent = 'Enviar para IA';
                
                // Limpa o formulário (opcional)
                // document.getElementById('aiForm').reset();
            }
        });
    </script>
</body>
</html>
